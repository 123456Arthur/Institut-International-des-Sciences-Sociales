<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Formateurs - Ultra HD 4K</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #010409;
            --accent: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.no-scroll { overflow: hidden; }

        .page-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            transition: filter 0.8s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-return {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 24px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-return:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Grille Haute Définition */
        .trainer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (min-width: 768px) {
            .trainer-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        }

        .trainer-card {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .trainer-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .trainer-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast; /* Améliore la netteté */
        }

        /* Overlay Zoom 4K */
        #focus-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            padding: 10px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #focus-overlay.active { display: flex; opacity: 1; }

        .focus-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: scale(0.9);
            transition: var(--transition);
        }

        #focus-overlay.active .focus-content { transform: scale(1); }

        .focus-img {
            max-width: 95%; /* Zoom encore plus grand */
            max-height: 75vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 0 100px rgba(56, 189, 248, 0.2);
        }

        .focus-bio-bar {
            text-align: center;
            margin-top: 20px;
            padding: 0 15px;
        }

        .focus-role-badge {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .focus-name { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 800; margin-bottom: 5px; }
        .focus-title { font-size: 1rem; color: #94a3b8; margin-bottom: 10px; }
        .focus-desc { font-size: 0.9rem; color: #64748b; max-width: 500px; font-style: italic; }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #fff;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            cursor: pointer;
            z-index: 100001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .focus-img { max-width: 100%; max-height: 60vh; }
            .close-btn { top: auto; bottom: 40px; right: calc(50% - 25px); }
            .focus-bio-bar { margin-bottom: 120px; }
        }
    </style>
</head>

<div id="focus-overlay">
    <button class="close-btn" onclick="closeZoom()">&times;</button>
    <div class="focus-content">
        <img src="" alt="" id="target-img" class="focus-img">
        <div class="focus-bio-bar">
            <div id="target-role" class="focus-role-badge"></div>
            <h2 id="target-name" class="focus-name"></h2>
            <p id="target-title" class="focus-title"></p>
            <p id="target-desc" class="focus-desc"></p>
        </div>
    </div>
</div>

<script>
    // Sécurité Anti-Vol
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === "F12" || (e.ctrlKey && ['c','u','s','i'].includes(e.key.toLowerCase()))) e.preventDefault();
    });

    const overlay = document.getElementById('focus-overlay');
    const mainContent = document.getElementById('main-content');

    function zoomTrainer(card) {
        document.getElementById('target-img').src = card.querySelector('img').src;
        document.getElementById('target-name').innerText = card.getAttribute('data-name');
        document.getElementById('target-title').innerText = card.getAttribute('data-title');
        document.getElementById('target-role').innerText = card.getAttribute('data-role');
        document.getElementById('target-desc').innerText = card.getAttribute('data-desc');

        overlay.style.display = 'flex';
        document.body.classList.add('no-scroll');
        setTimeout(() => {
            overlay.classList.add('active');
            mainContent.style.filter = 'blur(20px) brightness(0.3)';
        }, 10);
    }

    function closeZoom() {
        overlay.classList.remove('active');
        mainContent.style.filter = 'none';
        setTimeout(() => {
            overlay.style.display = 'none';
            document.body.classList.remove('no-scroll');
        }, 500);
    }

    overlay.onclick = e => { if (e.target === overlay || e.target.className === 'focus-content') closeZoom(); };
</script>
