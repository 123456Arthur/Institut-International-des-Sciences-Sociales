<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>UE7 | Numérique & Projet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #3b82f6; /* Bleu Électrique */
            --secondary: #8b5cf6; /* Violet Néon */
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: env(safe-area-inset-top) 1.25rem 6rem 1.25rem;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.1), transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(139, 92, 246, 0.1), transparent 40%);
            background-attachment: fixed;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .nav-header { display: flex; align-items: center; margin-bottom: 2rem; padding-top: 1rem; }
        .btn-back {
            display: flex; align-items: center; gap: 0.5rem; color: var(--text-dim);
            text-decoration: none; font-family: 'Space Grotesk'; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.1em; padding: 0.6rem 1.2rem;
            border-radius: 50px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); transition: var(--transition);
        }
        .btn-back:hover { color: #fff; background: var(--accent); border-color: var(--accent); transform: translateX(-5px); }

        header { margin: 1rem 0 3rem 0; padding-left: 1rem; border-left: 4px solid var(--secondary); }
        h1 { 
            font-size: clamp(1.8rem, 7vw, 3.5rem); font-weight: 800; letter-spacing: -0.04em; 
            line-height: 1.1; margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .stats { 
            display: flex; gap: 1.5rem; flex-wrap: wrap;
            color: var(--text-dim); font-family: 'Space Grotesk'; font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 0.1em; 
        }
        .stats b { color: var(--secondary); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.8rem;
            border-radius: 24px;
            transition: var(--transition);
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card.active, .card:hover {
            border-color: var(--secondary);
            background: rgba(139, 92, 246, 0.05);
            transform: translateY(-5px);
        }

        .card-num { 
            font-family: 'Space Grotesk'; font-size: 0.6rem; color: var(--secondary); 
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem;
        }
        .card-num::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .card-title { font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.4; }

        .card-desc {
            max-height: 0; opacity: 0; margin-top: 0; font-size: 0.85rem;
            color: var(--text-dim); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 1.5; overflow: hidden;
        }

        .card.active .card-desc { max-height: 200px; opacity: 1; margin-top: 1.2rem; }

        @media (max-width: 600px) {
            h1 { font-size: 1.9rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav class="nav-header">
            <a href="index.html" class="btn-back">← Accueil</a>
        </nav>

        <header>
            <h1>Numérique & <br>Gestion de Projet</h1>
            <div class="stats">
                <span>Ref: <b>UE7</b></span>
                <span>Poids: <b>18 Crédits</b></span>
                <span>Modules: <b>18</b></span>
            </div>
        </header>

        <main class="grid" id="main-grid"></main>
    </div>

    <script>
        const modules = [
            { t: "Procédures Bailleurs", d: "Maîtrise des normes et exigences administratives de l'UE, de l'AFD et des Nations Unies pour le financement." },
            { t: "Bureautique Avancée", d: "Optimisation de l'usage des outils collaboratifs et suites logicielles pour la productivité." },
            { t: "Communication digitale", d: "Stratégies de présence en ligne, gestion des réseaux sociaux et e-réputation d'un projet." },
            { t: "Pensée critique & Innovation", d: "Ateliers de Design Thinking et résolution créative de problèmes complexes." },
            { t: "Présentation Toolbox", d: "Création et partage d'une boîte à outils méthodologique pour le manager moderne." },
            { t: "Société digitale", d: "Analyse des impacts du numérique sur les interactions sociales et l'économie mondiale." },
            { t: "Faisabilité du projet", d: "Étude technique, économique et juridique avant le lancement d'une initiative." },
            { t: "Processus logistique", d: "Optimisation de la chaîne d'approvisionnement et gestion des flux opérationnels." },
            { t: "Initiation informatique", d: "Compréhension de l'architecture logicielle, du cloud et de la sécurité des données." },
            { t: "Intro Gestion de Projet", d: "Cycle de vie d'un projet, de l'idée initiale à la clôture officielle." },
            { t: "Logistique de terrain", d: "Gestion concrète des ressources et déploiement opérationnel sur le site." },
            { t: "Méthode Agile", d: "Pilotage par itérations (Scrum, Kanban) pour s'adapter aux changements rapides." },
            { t: "Méthodologie en projet", d: "Cadre logique et structuration des étapes clés pour garantir le succès." },
            { t: "Outils de gestion", d: "Prise en main de logiciels de pilotage (type MS Project, Trello ou Asana)." },
            { t: "Planification de projet", d: "Établissement des chronogrammes (Gantt) et allocation optimale des ressources." },
            { t: "Procédures en projet", d: "Standardisation des flux de travail pour assurer la conformité et l'efficacité." },
            { t: "Suivi-évaluation (MSE)", d: "Mise en place d'indicateurs de performance (KPI) pour mesurer les résultats." },
            { t: "Système d'information", d: "Organisation de la donnée et des flux de communication internes à l'organisation." }
        ];

        const grid = document.getElementById('main-grid');

        modules.forEach((mod, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-num">DIGIT-PM ${(index + 1).toString().padStart(2, '0')}</div>
                <div class="card-title">${mod.t}</div>
                <div class="card-desc">${mod.d}</div>
            `;
            
            card.addEventListener('click', function(e) {
                const isActive = this.classList.contains('active');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                if (!isActive) this.classList.add('active');
                e.stopPropagation();
            });

            grid.appendChild(card);
        });

        document.addEventListener('click', () => {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        });
    </script>
</body>
</html>
